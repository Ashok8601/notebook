<!DOCTYPE html>

<html>
<head>
<title>Trash</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
padding:40px;
color:#333;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h2{
font-size:28px;
color:white;
}

.back-btn{
text-decoration:none;
background:white;
color:#0066ff;
padding:10px 16px;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.back-btn:hover{
background:#e6f0ff;
transform:scale(1.05);
}

/* NOTES GRID */

.notes-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* NOTE CARD */

.note-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
position:relative;
}

.note-card:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.note-title{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.note-content{
font-size:14px;
color:#555;
margin-bottom:15px;
}

/* RESTORE BUTTON */

.restore-btn{
border:none;
background:#28a745;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.restore-btn:hover{
background:#1e7e34;
transform:scale(1.05);
}

/* EMPTY MESSAGE */

.empty{
color:white;
font-size:18px;
text-align:center;
margin-top:40px;
}

</style>

</head>
<body>

<div class="header">
<h2>🗑 Trash</h2>
<a href="/" class="back-btn">← Back to Notes</a>
</div>

<div class="notes-container">

{% if trash|length == 0 %}

<p class="empty">Trash is empty</p>

{% endif %}

{% for note in trash %}

<div class="note-card">

<div class="note-title">{{note.title}}</div>

<div class="note-content">{{note.content}}</div>

<form action="/restore_note/{{note.id}}" method="POST">
<button class="restore-btn">Restore</button>
</form>

</div>

{% endfor %}

</div>

</body>
</html>
