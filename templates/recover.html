<!DOCTYPE html>

<html>
<head>
<title>Recover Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

/* CARD */

.container{
background:white;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.container:hover{
transform:translateY(-4px);
}

/* TITLE */

h2{
margin-bottom:20px;
color:#333;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
outline:none;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#4facfe;
box-shadow:0 0 5px rgba(79,172,254,0.5);
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#0066ff;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#004ecc;
transform:scale(1.03);
}

/* LINK */

.back{
display:block;
margin-top:15px;
text-decoration:none;
color:#0066ff;
font-size:14px;
}

.back:hover{
text-decoration:underline;
}

/* FLASH MESSAGE */

.messages{
margin-top:15px;
}

.messages li{
list-style:none;
background:#ffe5e5;
color:#cc0000;
padding:10px;
border-radius:6px;
margin-top:8px;
font-size:14px;
}

</style>

</head>
<body>

<div class="container">

<h2>Recover Account</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="New Password" required>

<button type="submit">Recover</button>

</form>

<a href="/login" class="back">← Back to login</a>

<div class="messages">

{% with messages = get_flashed_messages() %}
{% if messages %}

<ul>
{% for m in messages %}
<li>{{m}}</li>
{% endfor %}
</ul>

{% endif %}
{% endwith %}

</div>

</div>

</body>
</html>
