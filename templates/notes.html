<!DOCTYPE html>

<html>
<head>
<title>Notes</title>
</head>
<body>

<h2>My Notes</h2>

<a href="/create_note">Create Note</a> | <a href="/trash">Trash</a> | <a href="/profile">Profile</a>

<br><br>

<form action="/search">
<input type="text" name="q" placeholder="Search">
<button type="submit">Search</button>
</form>

<br>

{% for note in notes %}

<hr>

<h3>{{note.title}}</h3>

<p>{{note.content}}</p>

<a href="/update_note/{{note.id}}">Edit</a>

<form action="/move_to_trash/{{note.id}}" method="POST">
<button type="submit">Delete</button>
</form>

<a href="/export_note/{{note.id}}?type=pdf">PDF</a>

<a href="/export_note/{{note.id}}?type=docx">DOCX</a>

{% endfor %}

</body>
</html>
