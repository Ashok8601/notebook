<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:8px;
width:320px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#e67e22;
border:none;
color:white;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#d35400;
}

</style>
</head>

<body>

<div class="card">

<h2>Reset Password</h2>

<form method="POST">

<input type="password" name="password" placeholder="New Password" required>

<button type="submit">Reset Password</button>

</form>

</div>

</body>
</html>
