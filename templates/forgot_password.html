<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:8px;
width:320px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#3498db;
border:none;
color:white;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

a{
text-decoration:none;
color:#3498db;
}

</style>
</head>

<body>

<div class="card">

<h2>Forgot Password</h2>

<p>Enter your email to receive OTP</p>

<form method="POST">

<input type="email" name="email" placeholder="Enter Email" required>

<button type="submit">Send OTP</button>

</form>

<br>

<a href="/login">Back to Login</a>

</div>

</body>
</html>
