<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f2f2f2; padding: 20px; }
        .profile-container {
            background: #fff; padding: 20px; border-radius: 10px; max-width: 400px;
            margin: 50px auto; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .profile-container h2 { text-align: center; margin-bottom: 20px; }
        .profile-info { margin-bottom: 10px; }
        .label { font-weight: bold; }
    </style>
</head>
<body>
    <div class="profile-container">
        <h2>User Profile</h2>
        <div class="profile-info"><span class="label">ID:</span> <span id="user-id"></span></div>
        <div class="profile-info"><span class="label">Name:</span> <span id="user-name"></span></div>
        <div class="profile-info"><span class="label">Email:</span> <span id="user-email"></span></div>
        <div class="profile-info"><span class="label">DOB:</span> <span id="user-dob"></span></div>
    </div>

    <script>
        async function fetchProfile() {
            try {
                const response = await fetch('https://quicknotes-b0t7.onrender.com/profile', {
                    method: 'GET',
                    credentials: 'include'  // ye zaruri hai session cookie bhejne ke liye
                });

                if(response.status === 401) {
                    alert("Login required!");
                    return;
                }

                const data = await response.json();

                // Display data
                document.getElementById('user-id').innerText = data.id;
                document.getElementById('user-name').innerText = data.name;
                document.getElementById('user-email').innerText = data.email;
                document.getElementById('user-dob').innerText = data.dob;

            } catch(err) {
                console.error(err);
                alert("Error fetching profile");
            }
        }

        fetchProfile();
    </script>
</body>
</html>
